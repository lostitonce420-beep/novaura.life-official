<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/novaura-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novaura OS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0a0a;
        color: #ffffff;
        overflow: hidden;
      }
      #root {
        width: 100vw;
        height: 100vh;
      }
      /* Loading screen */
      .loading-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a1628 100%);
        flex-direction: column;
        gap: 24px;
      }
      .loading-logo {
        font-size: 48px;
        font-weight: 200;
        letter-spacing: 8px;
        background: linear-gradient(135deg, #00d9ff, #a855f7, #ff00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .loading-subtitle {
        font-size: 14px;
        color: #666;
        letter-spacing: 2px;
      }
      .loading-bar {
        width: 200px;
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 1px;
        overflow: hidden;
      }
      .loading-progress {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #00d9ff, #a855f7);
        animation: loading 2s ease-in-out infinite;
      }
      @keyframes loading {
        0% { width: 0%; margin-left: 0%; }
        50% { width: 50%; margin-left: 0%; }
        100% { width: 0%; margin-left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-logo">NOVAURA</div>
        <div class="loading-subtitle">LOADING LOCAL ENVIRONMENT</div>
        <div class="loading-bar">
          <div class="loading-progress"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
