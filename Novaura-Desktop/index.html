<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novaura Desktop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #0a0a0f;
      color: #f4f6ff;
      height: 100vh;
      overflow: hidden;
    }
    
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 1.5rem;
      color: #00d9ff;
    }
    
    .desktop-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .titlebar {
      height: 32px;
      background: rgba(15, 17, 26, 0.95);
      border-bottom: 1px solid #1e2130;
      display: flex;
      align-items: center;
      padding: 0 16px;
      -webkit-app-region: drag;
      user-select: none;
    }
    
    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      color: #f4f6ff;
      flex: 1;
    }
    
    .titlebar-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    
    .titlebar-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }
    
    .titlebar-btn.close { background: #ff5f56; }
    .titlebar-btn.minimize { background: #ffbd2e; }
    .titlebar-btn.maximize { background: #27c93f; }
    
    .desktop-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .sidebar {
      width: 60px;
      background: rgba(10, 12, 20, 0.95);
      border-right: 1px solid #1e2130;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 16px;
    }
    
    .app-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4c65ff, #7b8fff);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-size: 20px;
    }
    
    .app-icon:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(76, 101, 255, 0.4);
    }
    
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    
    .welcome-title {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00d9ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .welcome-subtitle {
      color: #a7b0c8;
      font-size: 1.25rem;
    }
    
    .quick-actions {
      display: flex;
      gap: 16px;
      margin-top: 32px;
    }
    
    .quick-action-btn {
      padding: 12px 24px;
      background: rgba(76, 101, 255, 0.1);
      border: 1px solid rgba(76, 101, 255, 0.3);
      border-radius: 12px;
      color: #f4f6ff;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .quick-action-btn:hover {
      background: rgba(76, 101, 255, 0.2);
      border-color: rgba(76, 101, 255, 0.5);
    }
    
    .status-bar {
      height: 28px;
      background: rgba(15, 17, 26, 0.95);
      border-top: 1px solid #1e2130;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 12px;
      color: #6b7280;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .status-indicator.online {
      background: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }
    
    .status-indicator.offline {
      background: #6b7280;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="desktop-shell">
      <!-- Custom Titlebar -->
      <div class="titlebar">
        <div class="titlebar-title">Novaura Desktop</div>
        <div class="titlebar-controls">
          <button class="titlebar-btn minimize" onclick="minimizeWindow()"></button>
          <button class="titlebar-btn maximize" onclick="maximizeWindow()"></button>
          <button class="titlebar-btn close" onclick="closeWindow()"></button>
        </div>
      </div>
      
      <!-- Main Content -->
      <div class="desktop-content">
        <!-- Sidebar with App Icons -->
        <div class="sidebar">
          <div class="app-icon" title="Code IDE" onclick="openApp('ide')">💻</div>
          <div class="app-icon" title="Browser" onclick="openApp('browser')">🌐</div>
          <div class="app-icon" title="AI Chat" onclick="openApp('chat')">💬</div>
          <div class="app-icon" title="Terminal" onclick="openApp('terminal')">⌨️</div>
          <div class="app-icon" title="Files" onclick="openApp('files')">📁</div>
          <div class="app-icon" title="Settings" onclick="openApp('settings')">⚙️</div>
        </div>
        
        <!-- Main Area -->
        <div class="main-area">
          <div class="welcome-screen">
            <h1 class="welcome-title">Welcome to Novaura</h1>
            <p class="welcome-subtitle">Your AI-powered desktop operating system</p>
            
            <div class="quick-actions">
              <button class="quick-action-btn" onclick="createNewProject()">+ New Project</button>
              <button class="quick-action-btn" onclick="openRecent()">Recent Files</button>
              <button class="quick-action-btn" onclick="openSettings()">Settings</button>
            </div>
            
            <div id="ollama-status" style="margin-top: 32px; font-size: 14px; color: #6b7280;">
              Checking local AI status...
            </div>
          </div>
        </div>
      </div>
      
      <!-- Status Bar -->
      <div class="status-bar">
        <div class="status-item">
          <span class="status-indicator online"></span>
          <span>Ready</span>
        </div>
        <div class="status-item" id="memory-usage">
          Memory: --
        </div>
        <div class="status-item" id="cpu-usage">
          CPU: --
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // Tauri API integration
    const { invoke } = window.__TAURI__;
    
    // Window controls
    function minimizeWindow() {
      invoke('minimize');
    }
    
    function maximizeWindow() {
      invoke('maximize');
    }
    
    function closeWindow() {
      invoke('close');
    }
    
    // App launcher
    function openApp(appType) {
      console.log('Opening app:', appType);
      // This will integrate with your existing Web OS window system
      invoke('open_window', { type: appType });
    }
    
    // Quick actions
    function createNewProject() {
      invoke('create_directory', { path: '~/NovauraProjects/NewProject' });
    }
    
    function openRecent() {
      invoke('get_recent_files');
    }
    
    function openSettings() {
      openApp('settings');
    }
    
    // Check Ollama status
    async function checkOllama() {
      try {
        const isRunning = await invoke('check_ollama_status');
        const statusEl = document.getElementById('ollama-status');
        if (isRunning) {
          statusEl.innerHTML = '🟢 Local AI (Ollama) is running';
          statusEl.style.color = '#10b981';
        } else {
          statusEl.innerHTML = '🔴 Local AI not detected. Install Ollama for offline AI.';
          statusEl.style.color = '#ef4444';
        }
      } catch (e) {
        console.error('Error checking Ollama:', e);
      }
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      checkOllama();
      
      // Get system info
      invoke('get_system_info').then(info => {
        console.log('System:', info);
      });
    });
  </script>
</body>
</html>
