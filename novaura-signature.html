<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Novaura Life - Email Signature</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

<!-- 
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║                    NOVAURA LIFE - EMAIL SIGNATURE                            ║
  ║  Customize below:                                                            ║
  ║  - PHOTO_URL_1: Replace with your main image URL                             ║
  ║  - PHOTO_URL_2: Replace with your second image URL                           ║
  ║  - COLORS: Edit the RGB gradient border colors                               ║
  ║  - INFO: Edit name, title, phone, email                                      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
-->

<table role="presentation" cellpadding="0" cellspacing="0" border="0" 
       style="width: 600px; max-width: 100%; background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%); border-radius: 12px; overflow: hidden;">
  
  <tr>
    <td style="padding: 20px;">
      
      <!-- Main Layout Table -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
        <tr>
          
          <!-- LEFT COLUMN: Connected Photo Frames -->
          <td style="width: 180px; vertical-align: top; padding-right: 25px;">
            
            <!-- Photo Stack Container -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              
              <!-- TOP ROW: Main Photo -->
              <tr>
                <td>
                  <!-- Main Photo with RGB Frame -->
                  <table role="presentation" cellpadding="0" cellspacing="0" border="0" 
                         style="width: 100px; height: 100px; border-radius: 12px; overflow: hidden;">
                    <tr>
                      <td style="padding: 3px; background: linear-gradient(45deg, #ff0088, #ff6600, #ffff00, #00ff88, #00d4ff, #8800ff, #ff0088); background-size: 200% 200%;">
                        
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0" 
                               style="width: 100%; height: 100%; border-radius: 10px; overflow: hidden; background: #0a0a0f;">
                          <tr>
                            <td style="text-align: center; vertical-align: middle;">
                              <!-- ==================== MAIN PHOTO ==================== -->
                              <img src="https://via.placeholder.com/94x94/1a1a2e/00d4ff?text=DC" 
                                   alt="Dillan Copeland" 
                                   style="display: block; width: 94px; height: 94px; border-radius: 9px; object-fit: cover;"
                                   width="94" height="94" />
                            </td>
                          </tr>
                        </table>
                        
                      </td>
                    </tr>
                  </table>
                </td>
                
                <!-- Spacer to push second photo down -->
                <td style="width: 15px;"></td>
              </tr>
              
              <!-- MIDDLE: Connection spacing -->
              <tr>
                <td style="height: 5px;"></td>
                <td></td>
              </tr>
              
              <!-- BOTTOM ROW: Second Photo (positioned to connect) -->
              <tr>
                <!-- Spacer to push second photo right -->
                <td style="width: 35px;"></td>
                
                <td>
                  <!-- Second Photo with RGB Frame (slightly smaller) -->
                  <table role="presentation" cellpadding="0" cellspacing="0" border="0" 
                         style="width: 70px; height: 70px; border-radius: 10px; overflow: hidden;">
                    <tr>
                      <td style="padding: 3px; background: linear-gradient(225deg, #ff0088, #ff6600, #ffff00, #00ff88, #00d4ff, #8800ff, #ff0088); background-size: 200% 200%;">
                        
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0" 
                               style="width: 100%; height: 100%; border-radius: 8px; overflow: hidden; background: #0a0a0f;">
                          <tr>
                            <td style="text-align: center; vertical-align: middle;">
                              <!-- ==================== SECOND PHOTO ==================== -->
                              <img src="https://via.placeholder.com/64x64/1a1a2e/ff00ff?text=AXN" 
                                   alt="Aura x Nova" 
                                   style="display: block; width: 64px; height: 64px; border-radius: 7px; object-fit: cover;"
                                   width="64" height="64" />
                            </td>
                          </tr>
                        </table>
                        
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
              
            </table>
            <!-- End Photo Stack -->
            
            <!-- Connection Line Decoration (Visual connector between photos) -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top: -45px; margin-left: 70px; position: relative; z-index: 1;">
              <tr>
                <td style="width: 30px; height: 2px; background: linear-gradient(90deg, #00d4ff, #ff00ff); transform: rotate(45deg);"></td>
              </tr>
            </table>
            
          </td>
          
          <!-- RIGHT COLUMN: Info -->
          <td style="vertical-align: top; text-align: right; padding-top: 10px;">
            
            <!-- Name -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
              <tr>
                <td style="font-size: 24px; font-weight: 600; color: #ffffff; letter-spacing: 1px; padding-bottom: 4px; text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);">
                  Dillan Copeland
                </td>
              </tr>
            </table>
            
            <!-- Title -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
              <tr>
                <td style="font-size: 14px; font-weight: 400; color: #00d4ff; letter-spacing: 2px; text-transform: uppercase; padding-bottom: 2px;">
                  Owner/Founder
                </td>
              </tr>
            </table>
            
            <!-- Company -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
              <tr>
                <td style="font-size: 14px; font-weight: 300; color: #ff00ff; letter-spacing: 1px; padding-bottom: 15px;">
                  Aura x Nova
                </td>
              </tr>
            </table>
            
            <!-- Stars Decoration -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width: 100%; margin-bottom: 15px;">
              <tr>
                <td style="font-size: 8px; color: #00d4ff; letter-spacing: 8px; opacity: 0.7;">
                  ★ ★ ★ ★ ★
                </td>
              </tr>
            </table>
            
            <!-- Divider Line -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
              <tr>
                <td style="border-bottom: 1px solid; border-image: linear-gradient(90deg, transparent, #00d4ff, #ff00ff, transparent) 1; padding-bottom: 15px;"></td>
              </tr>
            </table>
            
            <!-- Contact Info -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width: 100%; margin-top: 15px;">
              
              <!-- Phone -->
              <tr>
                <td style="font-size: 13px; color: #8888aa; padding-bottom: 8px;">
                  <span style="color: #00ff88; font-size: 14px;">📱</span> 
                  <a href="tel:701-707-8881" style="color: #ccccdd; text-decoration: none;">701-707-8881</a>
                </td>
              </tr>
              
              <!-- Email -->
              <tr>
                <td style="font-size: 13px; color: #8888aa; padding-bottom: 8px;">
                  <span style="color: #ff6600; font-size: 14px;">✉</span> 
                  <a href="mailto:Novaura.life@novaura.life" style="color: #ccccdd; text-decoration: none;">Novaura.life@novaura.life</a>
                </td>
              </tr>
              
              <!-- Website -->
              <tr>
                <td style="font-size: 13px; color: #8888aa;">
                  <span style="color: #00d4ff; font-size: 14px;">🌐</span> 
                  <a href="https://novaura.life" style="color: #00d4ff; text-decoration: none; font-weight: 500;">novaura.life</a>
                </td>
              </tr>
              
            </table>
            
            <!-- Constellation Footer -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width: 100%; margin-top: 20px; opacity: 0.5;">
              <tr>
                <td style="text-align: center;">
                  <span style="font-size: 11px; color: #555577; letter-spacing: 4px; text-transform: uppercase; font-weight: 300;">✦ Novaura Life ✦</span>
                </td>
              </tr>
            </table>
            
          </td>
        </tr>
      </table>
      
    </td>
  </tr>
</table>

<!-- 
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║                              HOW TO USE                                      ║
  ║  1. Replace PHOTO_URL_1 with your main photo (top-left)                      ║
  ║  2. Replace PHOTO_URL_2 with your second photo (bottom-right connected)      ║
  ║  3. Copy this entire HTML into your email client's signature settings        ║
  ║                                                                              ║
  ║  PHOTO SUGGESTIONS:                                                          ║
  ║  - Photo 1: Your professional headshot                                       ║
  ║  - Photo 2: Novaura logo, Aura x Nova symbol, or complementary image         ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
-->

</body>
</html>
